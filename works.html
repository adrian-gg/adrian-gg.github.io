<body>
    <article id="ARTI-works" data-simplebar>

        <section class="ARTI-works__CONT-galeria-proyectos" data-simplebar>

            <nav class="ARTI-works__MENU-galeria-proyectos">

                <ul class="MENU-galeria-proyectos lang-ES">
                    <li class="MENU-galeria__proyectos-opcion proyectos-opcion--seleccionada" data-opcion="todos">Todos</li>
                    <li class="MENU-galeria__proyectos-opcion" data-opcion="graficos">Gráficos</li>
                    <li class="MENU-galeria__proyectos-opcion" data-opcion="web">Web</li>
                    
                </ul>
                <ul class="MENU-galeria-proyectos lang-EN">
                    <li class="MENU-galeria__proyectos-opcion proyectos-opcion--seleccionada" data-opcion="todos">All</li>
                    <li class="MENU-galeria__proyectos-opcion" data-opcion="graficos">Graphics</li>
                    <li class="MENU-galeria__proyectos-opcion" data-opcion="web">Web</li>
                    
                </ul>

            </nav>

            <div class="ARTI-works__galeria-proyectos">

                <span class="CONT-proyecto-imagen--selecionada">
                    <span class="proyecto-imagen--selecionada"></span>

                    <!-- SLIDER -->
                    <div class="container">
                        <div class="CONT-proyecto-imagenes"></div>                    
                        <!-- <div id="slides"></div> -->
                    </div>
                    <style>
                        .CONT-proyecto-imagenes{
                            width: 100%;
                            height: 100%;
                            display: grid;
                            grid-template-columns: repeat(3, minmax(1.6rem, 1fr));
                            grid-template-rows: repeat(4, minmax(1.6rem, 1fr));
                            grid-auto-rows: minmax(1.6rem, 1fr);
                            grid-gap: 0.4rem;
                        }
                        .proyecto-imagenes{
                            width: 100%;
                            height: 100%;
                            background-position: center;
                            background-size: cover;
                            cursor: pointer;
                        }
                        /*.proyecto-imagenes:nth-child(1){
                            grid-column: 1/3;
                            grid-row: 1/3;
                        }*/


                        /*--1 imagenes--*/
                        .CONT-proyecto-imagenes--1 .proyecto-imagenes:nth-child(1){
                            grid-column: 1/4;
                            grid-row: 1/5;
                        }
                        /*--2 imagenes--*/
                        .CONT-proyecto-imagenes--2 .proyecto-imagenes:nth-child(1){
                            grid-column: 1/4;
                            grid-row: 1/3;
                        }
                        .CONT-proyecto-imagenes--2 .proyecto-imagenes:nth-child(2){
                            grid-column: 1/4;
                            grid-row: 3/5;
                        }
                        /*--4 imagenes--*/
                        .CONT-proyecto-imagenes--4 .proyecto-imagenes:nth-child(1){
                            grid-column: 1/4;
                            grid-row: 1/3;
                        }
                        .CONT-proyecto-imagenes--4 .proyecto-imagenes:nth-child(2){
                            grid-column: 1/3;
                            grid-row: 3/5;
                        }
                        /*--6 imagenes--*/
                        .CONT-proyecto-imagenes--6 .proyecto-imagenes:nth-child(1){
                            grid-column: 1/3;
                            grid-row: 1/3;
                        }
                        .CONT-proyecto-imagenes--6 .proyecto-imagenes:nth-child(6){
                            grid-column: 2/4;
                            grid-row: 3/5;
                        }
                        /*--7 imagenes--*/
                        .CONT-proyecto-imagenes--7 .proyecto-imagenes:nth-child(1){
                            grid-column: 1/4;
                            grid-row: 1/3;
                        }
                        /*--9 imagenes--*/
                        .CONT-proyecto-imagenes--8 .proyecto-imagenes:nth-child(1){
                            grid-column: 1/3;
                            grid-row: 1/3;
                        }
                    </style>

                </span>

                <div class="ARTI-works__CONT-proyecto-imagen">
                    
                </div>

            </div>
        </section>

        <section class="ARTI-works__CONT-proyecto-detalles">
            <div class="ARTI-works__proyecto-detalles" data-simplebar>

                <div class="ARTI-works__CONT-datos-proyecto">
                    <div class="ARTI-works__proyecto-descripcion">
                        <h4 class="descripcion-titulo"></h4>
                        <p class="descripcion-texto lang-ES"></p>
                        <p class="descripcion-texto lang-EN"></p>

                    </div>

                    <div class="ARTI-works__proyecto-programas">
                        <h4 class="programas-titulo lang-ES">Programas</h4>
                        <h4 class="programas-titulo lang-EN">Programs</h4>
                        <div class="programas__CONT-programas"></div>

                    </div>

                </div>
            </div>
        </section>

    </article>

    <script>
        $(document).ready(function(){
            let proyectosKeys = Object.keys(proyectos);
            //console.log($('.ARTI-works__CONT-proyecto-imagen'))
            //console.log(values);
            for(var i = 0; i < proyectosKeys.length; i++){
                let typeProject = proyectos[proyectosKeys[i]].type.join(' ');
                $('.ARTI-works__CONT-proyecto-imagen').append(
                    `<div class="CONT-proyecto-imagen ${typeProject}" data-proyecto="${proyectosKeys[i]}">
                        <span class="proyecto-nombre"><h5>${proyectos[proyectosKeys[i]].title}</h5></span>
                        <img src="img/proyectos/${proyectosKeys[i]}/portada_-_${proyectosKeys[i]}.png" alt="Imagen con fondo transparente del logotipo del proyecto ${proyectosKeys[i]}" class="proyecto-imagen">
                        <img src="img/proyectos/${proyectosKeys[i]}/portada_-_${proyectosKeys[i]}.jpg" alt="Imagen del logotipo del proyecto ${proyectosKeys[i]}" class="proyecto-imagen-color">
                    </div>`
                );
            }
        });
    </script>
</body>
